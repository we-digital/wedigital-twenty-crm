name: Deploy CRM

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., v1.20.11, sha-abc1234, latest)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Create DB backup before deploy
        run: |
          echo "Creating database backup before deployment..."
          doctl databases backups create ${{ secrets.DO_DB_CLUSTER_ID }}
          echo "Backup initiated. Proceeding with deployment."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to stable
        run: |
          echo "Saving current stable as previous..."
          docker buildx imagetools create \
            -t "${IMAGE}:previous" "${IMAGE}:stable" 2>/dev/null \
            || echo "No existing stable tag — first deployment, skipping previous."

          echo "Promoting ${IMAGE}:${{ inputs.image_tag }} → stable..."
          docker buildx imagetools create \
            -t "${IMAGE}:stable" "${IMAGE}:${{ inputs.image_tag }}"

      - name: Trigger DO App Platform deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --force-rebuild
