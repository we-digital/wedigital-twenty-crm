name: Rollback CRM

on:
  workflow_dispatch:

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Swap stable and previous
        run: |
          echo "Inspecting current stable digest..."
          STABLE_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:stable" 2>/dev/null \
            | grep -oP 'Digest:\s+\K\S+' | head -1)

          echo "Inspecting previous digest..."
          PREVIOUS_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:previous" 2>/dev/null \
            | grep -oP 'Digest:\s+\K\S+' | head -1)

          if [ -z "$STABLE_DIGEST" ] || [ -z "$PREVIOUS_DIGEST" ]; then
            echo "ERROR: Cannot resolve stable ($STABLE_DIGEST) or previous ($PREVIOUS_DIGEST) digest."
            echo "Ensure at least two deployments have been made before rolling back."
            exit 1
          fi

          echo "Swapping: stable=${STABLE_DIGEST} ↔ previous=${PREVIOUS_DIGEST}"
          docker buildx imagetools create -t "${IMAGE}:stable" "${IMAGE}@${PREVIOUS_DIGEST}"
          docker buildx imagetools create -t "${IMAGE}:previous" "${IMAGE}@${STABLE_DIGEST}"
          echo "Swap complete."

      - name: Trigger DO App Platform deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --force-rebuild
