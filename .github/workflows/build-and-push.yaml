name: Build and Push CRM Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'main'
      skip_deploy:
        description: 'Skip auto-deploy after build'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      upstream_tag: ${{ steps.version.outputs.upstream_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Get upstream version
        id: version
        run: |
          if [ -f .upstream-version ]; then
            UPSTREAM_TAG=$(cat .upstream-version | tr -d '[:space:]')
          else
            UPSTREAM_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${UPSTREAM_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Built version: ${UPSTREAM_TAG} (sha: ${SHA_SHORT})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CRM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.upstream_tag }}
            ghcr.io/${{ github.repository }}:sha-${{ steps.version.outputs.sha_short }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: ${{ !inputs.skip_deploy }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Create DB backup before deploy
        run: |
          echo "Creating database backup before deployment..."
          doctl databases backups create ${{ secrets.DO_DB_CLUSTER_ID }}
          echo "Backup initiated."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to stable
        run: |
          echo "Saving current stable as previous..."
          docker buildx imagetools create \
            -t "${IMAGE}:previous" "${IMAGE}:stable" 2>/dev/null \
            || echo "No existing stable tag — first deployment, skipping previous."

          echo "Promoting latest → stable..."
          docker buildx imagetools create \
            -t "${IMAGE}:stable" "${IMAGE}:latest"

      - name: Trigger DO App Platform deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --force-rebuild
